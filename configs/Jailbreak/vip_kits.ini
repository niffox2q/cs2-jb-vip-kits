"Config"
{
	// Приветствую в плагине [JB] Vip Kits.
	// Плагин для настройки может показать немного странным и непонятным, поэтому вкратце попытаюсь объяснить тут. 
	// Также возле каждой строчки есть обозначение.
	// Ключ - значение в скобках. Значение ключа - Значение в скобках после ключа, думаю понятно.

	// Для каждого оружия вы можете настроить разные параметры, это ключи но с заранее установленным значением, например
	// Если мы хотим сделать супер Хе гранату которая снесёт всех, нам нужно создать такой набор, вот как он выглядит

	// "superHE"		
	//	 {
	//		 "weapons"
	//		 {
	//			 "weapon_hegrenade"					// Название получаемого оружия
	//			 {
	//				 "damage"	"1000"				// Урон который нанесет граната
	//			 }
	//		 }
	//	 }

	// В данном примере увеличителем урона является параметр "damage"		"1000"
	// Он относится только к гранате, обычному оружия его не приписать, так что не промахнитесь когда будете делать наборы.
	// Существующие параметры:
	// "damage"		"<число>" - Сколько снесёт граната в радиусе
	// "clip1"		"<число>" - Кол-во патронов в основной обойме
	// "clip2"		"<число>" - Кол-во сменных магазинов



	"freeday_block"			"1"						// Блокировать возможность получить Бунт-Набор во время Фридея
	"gameday_block"			"1"						// Блокировать возможность получить Бунт-Набор во время игрового дня

	"Kits"
	{
		"1deagleammo"								// Название набора, его будем использовать в groups.ini
		{
			"display"		"Дигл 1 патрон"			// Название набора, как он будет отображатся в меню
			"cooldown"		"1"						// Кулдаун в раундах

			"weapons"
			{
				"weapon_deagle"						// Название получаемого оружия
				{
					"clip1"		"1"					// Основная обойма
					"clip2"		"0"					// Доп. магазин
				}
			}
		}
		"superHE"		
		{
			"display"		"Супер ХЕ"			// Название набора, как он будет отображатся в меню
			"cooldown"		"1"						// Кулдаун в раундах

			"weapons"
			{
				"weapon_hegrenade"					// Название получаемого оружия
				{
					"damage"	"1000"				// Урон который нанесет граната
				}
			}
		}
	}
}